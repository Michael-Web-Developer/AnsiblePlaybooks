---
- name: Ping all foreign hosts from russia hosts
  hosts: russia
  gather_facts: false
  tasks:
    - name: ICMP ping each foreign host
      ansible.builtin.command:
        cmd: "ping -c 3 -W 2 {{ hostvars[item].ansible_host }}"
      loop: "{{ groups['foreign'] }}"
      loop_control:
        label: "{{ item }} ({{ hostvars[item].ansible_host }})"
      register: ping_results
      changed_when: false
      failed_when: false

    - name: Show ping results
      ansible.builtin.debug:
        msg: >-
          {{ item.item }} ({{ hostvars[item.item].ansible_host }}):
          {{ 'reachable' if item.rc == 0 else 'UNREACHABLE' }}
      loop: "{{ ping_results.results }}"
      loop_control:
        label: "{{ item.item }}"
